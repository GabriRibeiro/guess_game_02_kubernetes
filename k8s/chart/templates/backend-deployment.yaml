apiVersion: apps/v1
kind: Deployment
metadata:
  name: guess-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: guess-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: guess-backend
  template:
    metadata:
      labels:
        app: guess-backend
    spec:
      initContainers:
        - name: wait-postgres
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -c
            - until pg_isready -h guess-postgres -p 5432 -U {{ .Values.postgres.user }}; do echo waiting for postgres; sleep 2; done
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: guess-backend-config
          env:
            - name: FLASK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guess-postgres
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
