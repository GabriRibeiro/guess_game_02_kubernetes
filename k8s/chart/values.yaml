image:
  backend:
    repository: gabribeiro/guess-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  frontend:
    repository: gabribeiro/guess-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

postgres:
  image: postgres:16-alpine
  storage: 1Gi
  db: postgres
  user: postgres
  password: secretpass
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

backend:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

hpa:
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60

frontend:
  replicas: 1
  nodePort: 30080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
